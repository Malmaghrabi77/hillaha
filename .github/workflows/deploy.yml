name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID:  ${{ secrets.VERCEL_ORG_ID }}

jobs:
  # ─────────────────────────────────────────
  # Marketing Website
  # ─────────────────────────────────────────
  deploy-web:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy web to Vercel
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/web
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/web
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/web
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

  # ─────────────────────────────────────────
  # Partner Dashboard
  # ─────────────────────────────────────────
  deploy-partner:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy partner to Vercel
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/partner
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/partner
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd apps/partner
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PARTNER_PROJECT_ID }}
